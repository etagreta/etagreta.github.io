<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }}</title>
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:type" content="website">
    {% if page.og_image %}
    <meta property="og:image" content="https://etagreta.github.io{{ page.og_image }}">
    <meta property="og:image:width" content="{{ page.og_image_width | default: 1200 }}">
    <meta property="og:image:height" content="{{ page.og_image_height | default: 630 }}">
    {% endif %}
    {% if page.description %}
    <meta property="og:description" content="{{ page.description }}">
    {% endif %}
    <style>
      :root {
        --bg: #fff;
        --text: #222;
        --muted: #666;
        --strong: #111;
        --border: #ddd;
        --box-bg: #f5f5f5;
        --box-border: #888;
        --warning-bg: #fdf3f2;
        --warning-border: #c0392b;
        --tip-bg: #f0f6fb;
        --tip-border: #2980b9;
        --link: #2563a8;
        --hr: #ddd;
        --h2: #2B6ABB;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1a1a;
          --text: #ddd;
          --muted: #999;
          --strong: #f0f0f0;
          --border: #444;
          --box-bg: #252525;
          --box-border: #666;
          --warning-bg: #2a1a1a;
          --warning-border: #e05a4a;
          --tip-bg: #1a2535;
          --tip-border: #4a90d9;
          --link: #6aadee;
          --hr: #333;
          --h2: #6a9fd8;
        }
      }
      body {
        font-family: Georgia, serif;
        font-size: 17px;
        line-height: 1.7;
        color: var(--text);
        max-width: 680px;
        margin: clamp(24px, 6vw, 60px) auto;
        padding: 0 24px;
        background: var(--bg);
      }
      h1 { font-size: 2.3em; font-weight: bold; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.15em; color: var(--h2); }
      h2 { font-size: 1.2em; margin-top: 2em; border-bottom: 1px solid var(--border); padding-bottom: 4px; color: var(--h2); }
      .subtitle { color: var(--muted); font-size: 1.1em; margin-top: 0; font-style: italic; }
      ul, ol { padding-left: 1.4em; }
      li { margin-bottom: 0.4em; }
      ol li::marker { font-weight: bold; color: var(--muted); }
      a { color: var(--link); text-decoration: underline; text-underline-offset: 3px; }
      a:hover { opacity: 0.75; }
      hr { border: none; border-top: 2px solid var(--hr); margin: 2.5em 0; }
      .box {
        background: var(--box-bg);
        border-left: 4px solid var(--box-border);
        padding: 12px 16px;
        margin: 1.5em 0;
        border-radius: 2px;
      }
      .box.warning { border-left-color: var(--warning-border); background: var(--warning-bg); }
      .box.tip { border-left-color: var(--tip-border); background: var(--tip-bg); }
      strong { color: var(--strong); }
      img { max-width: 100%; height: auto; display: block; margin: 1.5em auto; border-radius: 3px; }
      figcaption { text-align: center; font-size: 0.85em; color: var(--muted); margin-top: -1em; margin-bottom: 1.5em; }
      footer { margin-top: 4em; font-size: 0.85em; color: var(--muted); border-top: 1px solid var(--border); padding-top: 1em; }
    </style>
  </head>
  <body>
    {{ content }}
    <footer>Pagina informativa non ufficiale.</footer>
  </body>
</html>
